<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Refund — Dylan Jo</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Caveat:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFFFFF; --paper-warm:#F8F5EF; --ink:#221F1B; --ink-soft:#75705F;
    --rule:#E7E1D3; --accent:#A65A45;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper-warm);color:var(--ink);font-family:'Poppins',sans-serif;font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh;}
  .wrap{max-width:520px;margin:0 auto;padding:60px 24px 100px;}
  h1{font-family:'Caveat',cursive;font-weight:700;font-size:2.2rem;margin:0 0 8px;}
  p.intro{color:var(--ink-soft);margin:0 0 30px;}
  .card{background:var(--paper);border:1px solid var(--rule);border-radius:16px;padding:32px;}
  label{display:block;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-soft);margin:18px 0 6px;}
  label:first-of-type{margin-top:0;}
  input,textarea{width:100%;padding:12px 14px;border:1px solid var(--rule);border-radius:10px;font-size:0.95rem;font-family:'Poppins',sans-serif;}
  textarea{min-height:100px;resize:vertical;}
  .btn{margin-top:24px;width:100%;padding:14px;border:none;border-radius:999px;background:var(--ink);color:#fff;font-family:'Poppins',sans-serif;font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;cursor:pointer;}
  .btn:disabled{opacity:0.6;}
  #success{display:none;text-align:center;padding:20px 0;}
  #success h2{font-family:'Cormorant Garamond',serif;font-size:1.4rem;margin:0 0 10px;}
  #success p{color:var(--ink-soft);}
  a.back{display:inline-block;margin-top:26px;color:var(--ink-soft);font-size:0.85rem;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Request a Refund</h1>
    <p class="intro">Give us your order details below and we'll review your request. You'll hear back by email.</p>
    <div class="card">
      <form id="refund-form">
        <label for="email">Your Email</label>
        <input type="email" id="email" required placeholder="you@email.com">
        <label for="order-ref">Order Reference (optional)</label>
        <input type="text" id="order-ref" placeholder="Order id or confirmation code, if you have it">
        <label for="reason">Reason for Refund</label>
        <textarea id="reason" placeholder="Tell us what happened…"></textarea>
        <button type="submit" class="btn" id="submit-btn">Submit Request</button>
      </form>
      <div id="success">
        <h2>Request received</h2>
        <p>We'll review your refund request and follow up by email shortly.</p>
      </div>
    </div>
    <a class="back" href="index.html">← Back to the shop</a>
  </div>

  <script>
    const form = document.getElementById('refund-form');
    const submitBtn = document.getElementById('submit-btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';
      try {
        const res = await fetch('https://veossvhvxgmstmiijmkw.supabase.co/functions/v1/submit-refund-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            order_reference: document.getElementById('order-ref').value,
            reason: document.getElementById('reason').value
          })
        });
        if (!res.ok) throw new Error('Request failed');
        form.style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } catch (err) {
        alert('Something went wrong submitting your request. Please try again or email us directly.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Request';
      }
    });
  </script>
</body>
</html>
